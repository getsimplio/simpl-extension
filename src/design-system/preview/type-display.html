<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: 0; }
  .meta { width: 140px; flex-shrink: 0; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
  .meta .px { font-family: var(--font-mono); text-transform: none; letter-spacing: 0; font-size: 11px; color: var(--ink-2); display: block; margin-top: 2px; }
  .specimen { color: var(--ink-1); }
</style></head>
<body><div class="card">
  <div class="row"><div class="meta">Display<span class="px">Plex Cond · 62/600</span></div><div class="specimen t-display" style="font-size:54px">Control your assets</div></div>
  <div class="row"><div class="meta">H1<span class="px">Plex Cond · 30/600</span></div><div class="specimen t-h1">Set up your wallet</div></div>
  <div class="row"><div class="meta">H2<span class="px">Plex Sans · 24/600</span></div><div class="specimen t-h2">Recent activity</div></div>
  <div class="row"><div class="meta">H3<span class="px">Plex Sans · 20/600</span></div><div class="specimen t-h3">Connected sites</div></div>
</div></body></html>
