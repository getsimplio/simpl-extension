<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 24px; }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px; }
  .seg { display: inline-flex; padding: 3px; background: var(--bg-sunken); border-radius: 6px; gap: 2px; }
  .seg button { background: transparent; border: 0; padding: 6px 14px; font: 500 12px/1 var(--font-sans); color: var(--ink-2); border-radius: 4px; cursor: pointer; }
  .seg button.active { background: var(--bg-surface); color: var(--ink-1); box-shadow: 0 1px 0 rgba(20,20,15,0.04), 0 0 0 1px rgba(20,20,15,0.06); }
  .row { display: flex; gap: 16px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
  .tab-bar { display: flex; gap: 24px; border-bottom: 1px solid var(--line); }
  .tab { padding: 10px 0; font: 500 13px/1 var(--font-sans); color: var(--ink-3); border-bottom: 2px solid transparent; cursor: pointer; margin-bottom: -1px; }
  .tab.active { color: var(--ink-1); border-bottom-color: var(--ink-1); }
  .toggle { width: 32px; height: 18px; background: var(--ink-1); border-radius: 999px; position: relative; cursor: pointer; }
  .toggle.off { background: var(--line-strong); }
  .toggle:after { content: ''; position: absolute; top: 2px; left: 16px; width: 14px; height: 14px; background: #fff; border-radius: 999px; transition: left var(--dur-base) var(--ease-out); }
  .toggle.off:after { left: 2px; }
  .toggle-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-1); }
</style></head>
<body><div class="card">
  <div class="label">Segmented · tabs · toggle</div>
  <div class="row">
    <div class="seg">
      <button class="active">Tokens</button>
      <button>NFTs</button>
      <button>Activity</button>
    </div>
    <div class="toggle-row">Hide small balances <span class="toggle"></span></div>
    <div class="toggle-row">Testnets <span class="toggle off"></span></div>
  </div>
  <div class="tab-bar">
    <div class="tab active">General</div>
    <div class="tab">Security</div>
    <div class="tab">Networks</div>
    <div class="tab">Connections</div>
    <div class="tab">About</div>
  </div>
</div></body></html>
