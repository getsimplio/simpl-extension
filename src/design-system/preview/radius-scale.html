<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 24px; }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 16px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .swatch { width: 64px; height: 64px; background: var(--ink-1); }
  .name { font-size: 11px; color: var(--ink-2); }
  .px { font-size: 10px; font-family: var(--font-mono); color: var(--ink-3); }
</style></head>
<body><div class="card">
  <div class="label">Radius scale · sharp & utility-first</div>
  <div class="row">
    <div class="item"><div class="swatch" style="border-radius:0"></div><div class="name">r-0</div><div class="px">0px</div></div>
    <div class="item"><div class="swatch" style="border-radius:2px"></div><div class="name">r-1</div><div class="px">2px</div></div>
    <div class="item"><div class="swatch" style="border-radius:4px"></div><div class="name">r-2</div><div class="px">4px</div></div>
    <div class="item"><div class="swatch" style="border-radius:6px"></div><div class="name">r-3</div><div class="px">6px</div></div>
    <div class="item"><div class="swatch" style="border-radius:8px"></div><div class="name">r-4</div><div class="px">8px</div></div>
    <div class="item"><div class="swatch" style="border-radius:12px"></div><div class="name">r-6</div><div class="px">12px</div></div>
    <div class="item"><div class="swatch" style="border-radius:999px"></div><div class="name">r-full</div><div class="px">pills only</div></div>
  </div>
</div></body></html>
