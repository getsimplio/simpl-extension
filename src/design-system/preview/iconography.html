<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  .card { padding: 28px 24px; }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px; }
  .sub { font-size: 11px; color: var(--ink-3); margin-bottom: 18px; font-family: var(--font-mono); }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 14px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic svg { stroke: var(--ink-1); stroke-width: 1.5; width: 22px; height: 22px; }
  .ic .nm { font-size: 9px; color: var(--ink-3); font-family: var(--font-mono); letter-spacing: 0; }
</style></head>
<body><div class="card">
  <div class="label">Iconography · Lucide · 1.5px stroke</div>
  <div class="sub">22px nominal · 18px in dense lists · 24px in headers</div>
  <div class="grid">
    <div class="ic"><i data-lucide="wallet"></i><div class="nm">wallet</div></div>
    <div class="ic"><i data-lucide="arrow-up-right"></i><div class="nm">send</div></div>
    <div class="ic"><i data-lucide="arrow-down-left"></i><div class="nm">receive</div></div>
    <div class="ic"><i data-lucide="arrow-left-right"></i><div class="nm">swap</div></div>
    <div class="ic"><i data-lucide="copy"></i><div class="nm">copy</div></div>
    <div class="ic"><i data-lucide="qr-code"></i><div class="nm">qr</div></div>
    <div class="ic"><i data-lucide="shield-check"></i><div class="nm">secure</div></div>
    <div class="ic"><i data-lucide="lock"></i><div class="nm">lock</div></div>
    <div class="ic"><i data-lucide="key"></i><div class="nm">key</div></div>
    <div class="ic"><i data-lucide="settings"></i><div class="nm">settings</div></div>
    <div class="ic"><i data-lucide="link-2"></i><div class="nm">connect</div></div>
    <div class="ic"><i data-lucide="plus"></i><div class="nm">add</div></div>
    <div class="ic"><i data-lucide="chevron-right"></i><div class="nm">next</div></div>
    <div class="ic"><i data-lucide="chevron-down"></i><div class="nm">expand</div></div>
    <div class="ic"><i data-lucide="search"></i><div class="nm">search</div></div>
    <div class="ic"><i data-lucide="eye"></i><div class="nm">show</div></div>
    <div class="ic"><i data-lucide="eye-off"></i><div class="nm">hide</div></div>
    <div class="ic"><i data-lucide="external-link"></i><div class="nm">explorer</div></div>
    <div class="ic"><i data-lucide="check"></i><div class="nm">check</div></div>
    <div class="ic"><i data-lucide="x"></i><div class="nm">close</div></div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
