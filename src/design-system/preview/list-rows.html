<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 24px; }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px; }
  .list { border: 1px solid var(--line); border-radius: 8px; background: var(--bg-surface); overflow: hidden; }
  .row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background var(--dur-base); }
  .row:last-child { border-bottom: 0; }
  .row:hover { background: var(--bg-hover); }
  .tok { width: 32px; height: 32px; border-radius: 999px; background: var(--ink-1); color: var(--ink-on-dark); display: flex; align-items: center; justify-content: center; font: 600 12px/1 var(--font-sans); flex-shrink: 0; }
  .tok.usdc { background: #2C5C8F; }
  .tok.btc { background: #46443D; }
  .body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .body .nm { font: 500 14px/1.2 var(--font-sans); color: var(--ink-1); }
  .body .sub { font: 400 12px/1.2 var(--font-sans); color: var(--ink-3); }
  .num { text-align: right; display: flex; flex-direction: column; gap: 2px; align-items: flex-end; }
  .num .v { font: 500 14px/1.2 var(--font-mono); color: var(--ink-1); font-feature-settings: 'tnum' on; }
  .num .q { font: 400 12px/1.2 var(--font-mono); color: var(--ink-3); }
  .delta-pos { color: var(--secure); }
  .delta-neg { color: var(--danger); }
</style></head>
<body><div class="card">
  <div class="label">Asset list row · the core wallet pattern</div>
  <div class="list">
    <div class="row">
      <div class="tok">Ξ</div>
      <div class="body"><div class="nm">Ethereum</div><div class="sub">0.4218 ETH · <span class="delta-pos">+1.2%</span></div></div>
      <div class="num"><div class="v">$1,284.22</div><div class="q">$3,042.18</div></div>
    </div>
    <div class="row">
      <div class="tok usdc">$</div>
      <div class="body"><div class="nm">USD Coin</div><div class="sub">5,210.00 USDC</div></div>
      <div class="num"><div class="v">$5,210.00</div><div class="q">$1.00</div></div>
    </div>
    <div class="row">
      <div class="tok btc">₿</div>
      <div class="body"><div class="nm">Bitcoin (wrapped)</div><div class="sub">0.082 wBTC · <span class="delta-neg">−0.8%</span></div></div>
      <div class="num"><div class="v">$6,353.00</div><div class="q">$77,476.83</div></div>
    </div>
  </div>
</div></body></html>
