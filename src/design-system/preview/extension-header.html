<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  .card { padding: 28px 24px; }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px; }
  .ext { width: 380px; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: var(--bg-surface); box-shadow: var(--elev-1); }
  .topbar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--line); }
  .topbar .acct { display: flex; align-items: center; gap: 6px; padding: 4px 8px; background: var(--bg-sunken); border-radius: 999px; font: 500 12px/1 var(--font-sans); color: var(--ink-1); cursor: pointer; }
  .acct .av { width: 16px; height: 16px; background: var(--ink-1); border-radius: 999px; }
  .net { display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 999px; font: 500 11px/1 var(--font-sans); color: var(--ink-2); border: 1px solid var(--line-strong); }
  .net .dot { width: 6px; height: 6px; background: var(--secure); border-radius: 999px; }
  .spacer { flex: 1; }
  .icbtn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: var(--ink-2); cursor: pointer; }
  .icbtn:hover { background: var(--bg-hover); color: var(--ink-1); }
  .icbtn svg { width: 16px; height: 16px; stroke-width: 1.5; }
  .addr { font: 400 11px/1 var(--font-mono); color: var(--ink-3); }
  .body { padding: 16px 14px; display: flex; flex-direction: column; gap: 4px; }
  .b-label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); }
  .b-val { font: 500 36px/1 var(--font-display); letter-spacing: -0.01em; color: var(--ink-1); font-feature-settings: 'tnum' on; }
</style></head>
<body><div class="card">
  <div class="label">Extension header pattern · 380px</div>
  <div class="ext">
    <div class="topbar">
      <div class="acct"><span class="av"></span>Account 1</div>
      <span class="addr">0x7d2F…9aE1</span>
      <span class="spacer"></span>
      <span class="net"><span class="dot"></span>Ethereum</span>
      <span class="icbtn"><i data-lucide="search"></i></span>
      <span class="icbtn"><i data-lucide="menu"></i></span>
    </div>
    <div class="body">
      <div class="b-label">Total balance</div>
      <div class="b-val">$12,847.<span style="color:var(--ink-3)">22</span></div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
