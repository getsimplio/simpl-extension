<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: 0; }
  .meta { width: 140px; flex-shrink: 0; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
  .meta .px { font-family: var(--font-mono); text-transform: none; letter-spacing: 0; font-size: 11px; color: var(--ink-2); display: block; margin-top: 2px; }
  .specimen { color: var(--ink-1); }
  .addr { color: var(--ink-2); }
</style></head>
<body><div class="card">
  <div class="row"><div class="meta">Balance<span class="px">Plex Cond · 42/500</span></div><div class="t-balance">$12,847.<span style="color:var(--ink-3)">22</span></div></div>
  <div class="row"><div class="meta">Mono large<span class="px">Plex Mono · 15/500</span></div><div class="specimen" style="font-family:var(--font-mono); font-size:15px; font-feature-settings:'tnum' on">0.4218 ETH</div></div>
  <div class="row"><div class="meta">Address<span class="px">Plex Mono · 13/400</span></div><div class="t-mono addr">0x7d2F…9aE1</div></div>
  <div class="row"><div class="meta">Hash<span class="px">Plex Mono · 12/400</span></div><div style="font-family:var(--font-mono); font-size:12px; color:var(--ink-3)">0x9c4f3a1bd827e0… ↗</div></div>
</div></body></html>
