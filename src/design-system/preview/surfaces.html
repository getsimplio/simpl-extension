<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 24px; background: var(--bg-sunken); }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .surf { background: var(--bg-surface); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
  .surf .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .surf .t { font: 500 13px/1.2 var(--font-sans); color: var(--ink-1); }
  .surf .m { font: 400 11px/1.2 var(--font-sans); color: var(--ink-3); }
  .pill { padding: 2px 6px; background: var(--secure-soft); color: var(--secure); border-radius: 3px; font: 500 10px/1.3 var(--font-sans); }
  .pill.warn { background: var(--warn-soft); color: var(--warn); }
  .v { font: 500 22px/1 var(--font-display); letter-spacing: -0.01em; color: var(--ink-1); }
  .delta { font: 400 11px/1 var(--font-mono); color: var(--ink-3); margin-top: 4px; }
  .delta.up { color: var(--secure); }
</style></head>
<body><div class="card">
  <div class="label">Surfaces · cards</div>
  <div class="grid">
    <div class="surf">
      <div class="top"><div><div class="t">Total balance</div><div class="m">All networks</div></div><span class="pill">Live</span></div>
      <div class="v">$12,847.22</div>
      <div class="delta up">+$144.20 · 1.2% today</div>
    </div>
    <div class="surf">
      <div class="top"><div><div class="t">Gas tracker</div><div class="m">Ethereum Mainnet</div></div><span class="pill warn">Normal</span></div>
      <div class="v">12 <span style="font-size:13px;color:var(--ink-3);font-family:var(--font-sans)">gwei</span></div>
      <div class="delta">$0.42 · standard transfer</div>
    </div>
  </div>
</div></body></html>
