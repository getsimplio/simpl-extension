<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 24px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .block { background: var(--ink-1); border-radius: 1px; }
  .tag { font-size: 10px; color: var(--ink-3); font-family: var(--font-mono); }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px; }
  .demo { margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--line); display: flex; gap: 24px; align-items: flex-end; }
  .stack { background: var(--bg-sunken); padding: 12px; display: flex; flex-direction: column; gap: 8px; border-radius: 4px; }
  .line-block { height: 8px; background: var(--ink-1); }
</style></head>
<body><div class="card">
  <div class="label">Spacing scale · 4-based</div>
  <div class="row">
    <div class="item"><div class="block" style="width:2px;height:32px"></div><div class="tag">2</div></div>
    <div class="item"><div class="block" style="width:4px;height:32px"></div><div class="tag">4</div></div>
    <div class="item"><div class="block" style="width:8px;height:32px"></div><div class="tag">8</div></div>
    <div class="item"><div class="block" style="width:12px;height:32px"></div><div class="tag">12</div></div>
    <div class="item"><div class="block" style="width:16px;height:32px"></div><div class="tag">16</div></div>
    <div class="item"><div class="block" style="width:20px;height:32px"></div><div class="tag">20</div></div>
    <div class="item"><div class="block" style="width:24px;height:32px"></div><div class="tag">24</div></div>
    <div class="item"><div class="block" style="width:32px;height:32px"></div><div class="tag">32</div></div>
    <div class="item"><div class="block" style="width:40px;height:32px"></div><div class="tag">40</div></div>
    <div class="item"><div class="block" style="width:48px;height:32px"></div><div class="tag">48</div></div>
    <div class="item"><div class="block" style="width:64px;height:32px"></div><div class="tag">64</div></div>
  </div>
</div></body></html>
