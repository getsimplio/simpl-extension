<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 24px; background: #14140F; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .opt { background: #1B1B19; border-radius: 4px; padding: 24px; display: flex; align-items: center; justify-content: center; min-height: 110px; }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #7A776E; margin-top: 8px; text-align: center; font-family: "IBM Plex Sans", system-ui; }
  .wrap { display: flex; flex-direction: column; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="wrap"><div class="opt"><svg viewBox="0 0 64 64" width="64" height="64" style="color:#F6F5F1"><path d="M0 6 L 50 6 L 50 38 L 38 50 L 0 50 Z" fill="currentColor"/><rect x="10" y="26" width="22" height="4" fill="#14140F"/></svg></div><div class="label">A · Notched chip (primary)</div></div>
    <div class="wrap"><div class="opt"><svg viewBox="0 0 64 64" width="64" height="64" style="color:#F6F5F1"><path d="M4 4 H 46 L 60 18 V 60 H 4 Z" fill="currentColor"/><rect x="14" y="28" width="36" height="2" fill="#14140F"/><rect x="14" y="34" width="22" height="2" fill="#14140F"/></svg></div><div class="label">B · SIM card</div></div>
    <div class="wrap"><div class="opt"><svg viewBox="0 0 64 64" width="64" height="64" style="color:#F6F5F1"><rect x="6" y="10" width="44" height="14" fill="currentColor"/><rect x="14" y="40" width="44" height="14" fill="currentColor"/><rect x="14" y="24" width="36" height="16" fill="none" stroke="currentColor" stroke-width="2"/></svg></div><div class="label">C · Stacked S</div></div>
    <div class="wrap"><div class="opt"><svg viewBox="0 0 64 64" width="64" height="64" style="color:#F6F5F1"><circle cx="32" cy="32" r="28" fill="currentColor"/><rect x="30" y="6" width="4" height="14" fill="#14140F"/><circle cx="32" cy="32" r="6" fill="#14140F"/></svg></div><div class="label">D · Vault dial</div></div>
  </div>
</div></body></html>
