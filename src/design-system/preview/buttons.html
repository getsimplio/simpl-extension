<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 24px; }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .btn {
    height: 36px; padding: 0 16px; border-radius: 6px; font: 500 13px/1 var(--font-sans);
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    transition: background var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out);
    border: 1px solid transparent;
  }
  .btn.primary { background: var(--ink-1); color: var(--ink-on-dark); }
  .btn.primary:hover { background: #2a2920; }
  .btn.secondary { background: var(--bg-surface); color: var(--ink-1); border-color: var(--line-strong); }
  .btn.secondary:hover { background: var(--bg-hover); }
  .btn.ghost { background: transparent; color: var(--ink-1); }
  .btn.ghost:hover { background: var(--bg-hover); }
  .btn.danger { background: var(--bg-surface); color: var(--danger); border-color: var(--danger); }
  .btn.danger:hover { background: var(--danger-soft); }
  .btn.lg { height: 44px; padding: 0 20px; font-size: 14px; border-radius: 8px; }
  .btn.sm { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 4px; }
  .btn[disabled] { opacity: 0.4; pointer-events: none; }
</style></head>
<body><div class="card">
  <div class="label">Buttons</div>
  <div class="row">
    <button class="btn primary lg">Continue</button>
    <button class="btn secondary lg">Cancel</button>
    <button class="btn danger lg">Remove account</button>
  </div>
  <div class="row">
    <button class="btn primary">Send</button>
    <button class="btn secondary">Add token</button>
    <button class="btn ghost">Skip</button>
    <button class="btn primary" disabled>Disabled</button>
  </div>
  <div class="row">
    <button class="btn primary sm">Copy</button>
    <button class="btn secondary sm">Edit</button>
    <button class="btn ghost sm">Dismiss</button>
  </div>
</div></body></html>
