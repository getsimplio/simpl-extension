<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SIMPLE · Chrome Extension UI Kit</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { background: var(--bg-sunken); padding: 40px 24px 60px; }
  .kit-root { max-width: 1340px; margin: 0 auto; }
  .kit-header { margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; }
  .kit-mark { display: flex; align-items: center; gap: 10px; }
  .kit-title { font: 600 16px/1 var(--font-display); letter-spacing: 0.02em; color: var(--ink-1); }
  .kit-meta { font: 400 12px/1 var(--font-mono); color: var(--ink-3); }
  .kit-wall { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px 28px; justify-items: center; }
  .popup-tile { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .caption { font: 500 11px/1 var(--font-sans); letter-spacing: 0.06em; color: var(--ink-3); text-transform: uppercase; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
